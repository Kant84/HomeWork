---
- name: Install Docker on all hosts
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start Docker
      systemd:
        name: docker
        state: started
        enabled: yes

- name: Install GitLab
  hosts: gitlab
  become: yes
  tasks:
    - name: Create directories
      file:
        path: "/srv/gitlab/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - config
        - logs
        - data

    - name: Run GitLab container
      docker_container:
        name: gitlab
        image: gitlab/gitlab-ce:latest
        state: started
        restart_policy: always
        hostname: gitlab-server
        ports:
          - "80:80"
          - "443:443"
          - "2222:22"
        volumes:
          - /srv/gitlab/config:/etc/gitlab
          - /srv/gitlab/logs:/var/log/gitlab
          - /srv/gitlab/data:/var/opt/gitlab

    - name: Wait for GitLab
      uri:
        url: "http://localhost/users/sign_in"
        status_code: 200
      register: gitlab_health
      until: gitlab_health.status == 200
      retries: 30
      delay: 10
      ignore_errors: yes

    - name: Get root password
      command: docker exec gitlab grep 'Password:' /etc/gitlab/initial_root_password
      register: gitlab_password
      ignore_errors: yes

    - debug:
        msg: "GitLab root password: {{ gitlab_password.stdout | default('see /etc/gitlab/initial_root_password') }}"

- name: Install SonarQube
  hosts: sonarqube
  become: yes
  tasks:
    - name: Set sysctl
      sysctl:
        name: vm.max_map_count
        value: "262144"
        state: present
        reload: yes

    - name: Create directories
      file:
        path: "/srv/sonarqube/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - data
        - extensions
        - logs
        - postgres_data

    - name: Copy docker-compose
      copy:
        dest: /srv/sonarqube/docker-compose.yml
        content: |
          version: "3"
          services:
            sonarqube:
              image: sonarqube:community
              depends_on:
                - db
              environment:
                SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
                SONAR_JDBC_USERNAME: sonar
                SONAR_JDBC_PASSWORD: sonar
              volumes:
                - /srv/sonarqube/data:/opt/sonarqube/data
                - /srv/sonarqube/extensions:/opt/sonarqube/extensions
                - /srv/sonarqube/logs:/opt/sonarqube/logs
              ports:
                - "9000:9000"
            db:
              image: postgres:12
              environment:
                POSTGRES_USER: sonar
                POSTGRES_PASSWORD: sonar
              volumes:
                - /srv/sonarqube/postgres_data:/var/lib/postgresql/data

    - name: Start SonarQube
      command: docker-compose up -d
      args:
        chdir: /srv/sonarqube

- name: Install GitLab Runner
  hosts: gitlab_runner
  become: yes
  tasks:
    - name: Create config directory
      file:
        path: /srv/gitlab-runner/config
        state: directory
        mode: '0755'

    - name: Run GitLab Runner
      docker_container:
        name: gitlab-runner
        image: gitlab/gitlab-runner:latest
        state: started
        restart_policy: always
        volumes:
          - /srv/gitlab-runner/config:/etc/gitlab-runner
          - /var/run/docker.sock:/var/run/docker.sock
