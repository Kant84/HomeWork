[gitlab]
gitlab-server ansible_host=46.21.245.114 ansible_user=ubuntu

[gitlab_runner]
gitlab-runner ansible_host=192.168.100.28 ansible_user=ubuntu ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ubuntu@46.21.245.114"'

[sonarqube]
sonarqube-server ansible_host=93.77.184.24 ansible_user=ubuntu

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
